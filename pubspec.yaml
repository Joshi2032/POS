name: zapata_flutter
description: Zapata - Flutter port of the original Angular app (scaffold)
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  intl: ^0.18.0
  supabase_flutter: ^1.5.0
  http: ^0.13.6
  go_router: ^17.2.3
  flutter_dotenv: ^6.0.1

# ¡EL TRUCO ESTÁ AQUÍ! Obligamos a Flutter a usar el paquete de Apple moderno 
# que no bloquea la compilación de Android, salvando la dependencia escondida de Supabase.
dependency_overrides:
  sign_in_with_apple: ^6.1.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env